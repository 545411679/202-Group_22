services:

  # ==========================================
  # MySQL 8 Database
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: consult-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: consult_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - consult-network

  # ==========================================
  # Spring Boot Backend
  # ==========================================
  backend:
    build:
      context: ../
      dockerfile: docker/Backend.Dockerfile
    container_name: consult-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/consult_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - consult-network

  # ==========================================
  # Vue 3 Frontend (Nginx)
  # ==========================================
  frontend:
    build:
      context: ../
      dockerfile: docker/FrontEnd.Dockerfile
    container_name: consult-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - consult-network

volumes:
  mysql-data:
    driver: local

networks:
  consult-network:
    driver: bridge
