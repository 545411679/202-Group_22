spring.application.name=consult-booking-system

spring.datasource.url=jdbc:mysql://localhost:3306/consult_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

spring.jackson.serialization.write-dates-as-timestamps=false

jwt.secret=group22-booking-system-secret-key-must-be-32chars!
jwt.expiration-ms=86400000

server.port=8080

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads
app.cors.allowed-origins=http://localhost,http://localhost:80,http://localhost:5173,http://localhost:3000,http://localhost:5200
